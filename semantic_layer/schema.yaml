dataset:
name: balls
description: >
IPL ball-by-ball dataset. Each row represents a delivery event within an innings.
Illegal deliveries (wides, no-balls) are also recorded as rows, therefore multiple
rows may share the same over and ball values.

grain:
description: "One row = one delivery event"
primary_key: column00

ordering:
chronological_column: ball_no
note: >
ball_no determines chronological order within an innings.
Multiple rows may share the same over and ball due to illegal deliveries.

query_guardrails:

sql_safety_rules:

```
allowed_operations:
  - SELECT
  - WITH
  - GROUP BY
  - ORDER BY
  - LIMIT
  - HAVING
  - WHERE
  - JOIN
  - DISTINCT

forbidden_operations:
  - DELETE
  - UPDATE
  - INSERT
  - DROP
  - ALTER
  - TRUNCATE
  - CREATE

instructions: >
  This database is strictly read-only.
  The AI must never generate queries that modify the database.
  Only SELECT-based analytical queries are allowed.

  If a user request implies modifying data (update, delete, correction),
  the AI must refuse and explain that the database is read-only.
```

entity_resolution:

description: >
Users may refer to players, teams, venues, cities, or officials
using different spellings, abbreviations, initials, or partial names.
The AI must resolve these to the closest matching values present
in the dataset before constructing SQL queries.

entity_types:

```
players:
  columns:
    - batter
    - bowler
    - non_striker
    - player_out
    - new_batter
    - next_batter
    - player_of_match
    - review_batter

  resolution_strategy:
    - Normalize case
    - Ignore punctuation
    - Match initials with full names
    - Use fuzzy similarity
    - Prefer exact dataset match

  examples:
    - user_input: "Virat Kohli"
      possible_dataset_values:
        - "V Kohli"
        - "V. Kohli"

    - user_input: "Rohit Sharma"
      possible_dataset_values:
        - "RG Sharma"

    - user_input: "Brendon McCullum"
      possible_dataset_values:
        - "BB McCullum"

teams:
  columns:
    - batting_team
    - bowling_team
    - toss_winner
    - match_won_by
    - superover_winner
    - team_reviewed

  resolution_strategy:
    - Match abbreviations to full team names
    - Use fuzzy matching
    - Prefer exact dataset match

  examples:
    - user_input: "KKR"
      dataset_value: "Kolkata Knight Riders"

    - user_input: "MI"
      dataset_value: "Mumbai Indians"

    - user_input: "RCB"
      dataset_value: "Royal Challengers Bangalore"

venues:
  columns:
    - venue

  resolution_strategy:
    - Normalize spelling
    - Use fuzzy similarity
    - Prefer dataset value

cities:
  columns:
    - city

  resolution_strategy:
    - Case-insensitive matching
    - Fuzzy matching allowed

umpires:
  columns:
    - umpire

  resolution_strategy:
    - Initial matching
    - Fuzzy name matching
```

ambiguity_handling:

duplicate_names:

```
description: >
  Multiple players may share similar or identical names.
  If multiple dataset matches exist, the AI must identify the
  most likely match based on context such as season, team,
  or role (batter vs bowler).
```

ambiguity_resolution_rules:

```
- Prefer exact match in dataset
- Prefer player appearing most frequently
- Prefer player active in relevant season
- If still ambiguous, return results for all matching entities
```

misspelling_handling:

```
description: >
  User inputs may contain spelling errors.
  The AI should use fuzzy matching techniques to identify
  the closest matching dataset value.

examples:
  - user_input: "Brendon McCullom"
    corrected_entity: "BB McCullum"

  - user_input: "Virat Kohly"
    corrected_entity: "V Kohli"
```


reliability_flags:
unreliable_columns:
- runs_not_boundary
partially_reliable_columns:
- new_batter

tables:

balls:

```
columns:

  column00: or ROW Index
    type: BIGINT
    role: primary_key
    description: Unique row identifier from source dataset.

  match_id:
    type: BIGINT
    description: Unique identifier of match.

  date:
    type: DATE
    description: Match date. Format is YYYY-MM-DD

  match_type:
    type: VARCHAR
    description: Match format classification. Since this IPL data, it is T20 everywhere

  event_name:
    type: VARCHAR
    description: Tournament name. Since this is IPL data, it is Indian Premier League everywhere

  season:
    type: VARCHAR
    description: Season identifier.

  stage:
    type: VARCHAR
    description: Stage of tournament (group, qualifier, final etc).

  event_match_no:
    type: VARCHAR
    description: Match number within tournament.

  match_number:
    type: VARCHAR
    description: Alternate match numbering. Not reliable, do not use in analysis

  innings:
    type: BIGINT
    description: Innings number within match. This would be usually 1 or 2, but in case of super over it could be 3,4,5 or 6 depending upon the game

  batting_team:
    type: VARCHAR
    description: Team currently batting.

  bowling_team:
    type: VARCHAR
    description: Team currently bowling.

  over:
    type: BIGINT
    description: Over number starting from 0. It reads 0 then it is the first over, it read 19 then it is 20th over of the innings, etc.

  ball:
    type: BIGINT
    description: Ball index within over. May repeat due to wides/no-balls/extras.

  ball_no:
    type: DOUBLE
    description: Decimal representation of delivery order. It will be read 0.1,0.2, 0.3, etc. May repeat due to wides/no-balls/extras.

  batter:
    type: VARCHAR
    description: Striker on this delivery.

  bat_pos:
    type: BIGINT
    description: Batting order position.

  non_striker:
    type: VARCHAR
    description: Non-striker batter.

  non_striker_pos:
    type: BIGINT
    description: Batting order position of non-striker.

  bowler:
    type: VARCHAR
    description: Bowler delivering this ball.

  valid_ball:
    type: BIGINT
    description: >
      Indicates whether delivery is legal.
      1 = legal delivery
      0 = illegal delivery (wide, no-ball etc).

  balls_faced:
    type: BIGINT
    description: >
      As per standard rules - Indicates if delivery counts toward batter's balls faced tally.
      Example: wides = 0, no-balls = 1, leg-bys = 1

  runs_batter:
    type: BIGINT
    description: Runs scored off the bat on this delivery.

  runs_extras:
    type: BIGINT
    description: Runs scored as extras.

  runs_total:
    type: BIGINT
    description: Total runs scored on delivery (runs_batter + runs_extras).

  runs_bowler:
    type: BIGINT
    description: >
      Runs credited to bowler including wides and no-balls.
      Does not include byes or leg-byes.

  runs_not_boundary:
    type: BOOLEAN
    reliability: unreliable
    description: Column marked unreliable and should not be used for analytics.

  extra_type:
    type: VARCHAR
    description: Type of extra (wide, no-ball, bye, leg-bye).

  wicket_kind:
    type: VARCHAR
    description: Dismissal type.

  player_out:
    type: VARCHAR
    description: Player dismissed on this delivery.

  striker_out:
    type: BOOLEAN
    description: >
      TRUE if striker was dismissed.
      FALSE if non-striker dismissed or no dismissal occurred.

  fielders:
    type: VARCHAR
    description: Fielders involved in dismissal.

  runs_target:
    type: DOUBLE
    description: Target runs for chasing team.

  review_batter:
    type: VARCHAR
    description: Batter involved in DRS review.

  team_reviewed:
    type: VARCHAR
    description: Team requesting review.

  review_decision:
    type: VARCHAR
    description: Outcome of review.

  umpire:
    type: VARCHAR
    description: Umpire responsible for decision.

  umpires_call:
    type: BOOLEAN
    description: Indicates if decision relied on umpire's call.

  player_of_match:
    type: VARCHAR
    description: Player awarded player of the match.

  match_won_by:
    type: VARCHAR
    description: Team winning the match.

  win_outcome:
    type: VARCHAR
    description: Type of win (runs, wickets etc).

  toss_winner:
    type: VARCHAR
    description: Team winning the toss.

  toss_decision:
    type: VARCHAR
    description: Toss decision (bat or field).

  venue:
    type: VARCHAR
    description: Stadium name.

  city:
    type: VARCHAR
    description: City where match took place.

  day:
    type: BIGINT
    description: Day component of match date.

  month:
    type: BIGINT
    description: Month component of match date.

  year:
    type: BIGINT
    description: Year component of match date.

  gender:
    type: VARCHAR
    description: Gender category of competition. It is all male

  team_type:
    type: VARCHAR
    description: Competition team classification.

  superover_winner:
    type: VARCHAR
    description: Winner of super over if applicable.

  result_type:
    type: VARCHAR
    description: Match result classification. Tie, D/L, etc.

  method:
    type: VARCHAR
    description: Match decision method (D/L or NULL/NA is normal).

  balls_per_over:
    type: BIGINT
    description: Number of balls per over. This is constantly 6, since it is a structured tournament

  overs:
    type: BIGINT
    description: Maximum overs allowed in innings. This is always 20. May very incase of superovers.

  team_runs:
    type: BIGINT
    description: Cumulative runs of batting team after this delivery.

  team_balls:
    type: BIGINT
    description: Cumulative legal balls faced by batting team.

  team_wicket:
    type: BIGINT
    description: Cumulative wickets lost by batting team.

  new_batter:
    type: VARCHAR
    reliability: partially_reliable
    description: Incoming batter after dismissal.

  batter_runs:
    type: BIGINT
    description: Batter cumulative runs after this ball.

  batter_balls:
    type: BIGINT
    description: Batter cumulative balls faced after this ball.

  bowler_wicket:
    type: BIGINT
    description: Cumulative wickets credited to bowler.

  batting_partners:
    type: VARCHAR
    description: Tuple representing batting pair. Example: ('BB McCullum', 'SC Ganguly') , ('BB McCullum', 'RT Ponting')

  next_batter:
    type: VARCHAR
    description: Next batter expected. Not highly reliable
```

metrics:

powerplay:
definition: "over between 0.1 and 5.6 including both ends"

middle_overs:
definition: "over between 6.1 and 14.6 including both ends"

death_overs:
definition: "over between 15.1 and 19.6 including both ends"

strike_rate:
definition: "(SUM(runs_batter) / SUM(balls_faced)) * 100"

economy_rate:
definition: "SUM(runs_bowler) / (SUM(valid_ball)/6)"

dot_ball:
definition: "runs_total = 0 AND valid_ball = 1"

boundary:
definition: "runs_batter IN (4,6)"
