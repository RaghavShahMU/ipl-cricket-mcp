name: IPL AI Query Test

on:
workflow_dispatch:

jobs:
run-test:

```
runs-on: ubuntu-latest

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install duckdb pandas google-generativeai pyyaml

  - name: Run AI Query Test
    run: |
      python scripts/test_ai_query.py
```
